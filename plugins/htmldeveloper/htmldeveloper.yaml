name: HTML Developer Mode
version: 1.0.0
description: "Embed raw HTML, CSS, and JavaScript in Typemill content using fenced code blocks with the \"rawhtml\" language tag. WARNING: This plugin intentionally bypasses HTML sanitization. Only enable it on sites where every content editor is fully trusted. Never use it on public multi-user sites with untrusted editors."
author: Moritz
homepage: https://github.com/moritzfl/Typemill-Plugins
license: LGPL

settings:
  csp_domains: ''

forms:
  fields:

    csp_domains:
      type: textarea
      label: Allowed External Domains (CSP)
      placeholder: "https://img.shields.io\nhttps://cdn.jsdelivr.net"
      description: "htmldeveloper.csp_domains_help"

